version: "3.9"

services:
  app:
    build: .
    image: blog-thing:local
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./uploads:/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
